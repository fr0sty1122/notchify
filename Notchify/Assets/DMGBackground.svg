<svg width="640" height="400" viewBox="0 0 640 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="640" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F1FF"/>
      <stop offset="1" stop-color="#E7E0FB"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.58" r="0.55">
      <stop stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arrow" x1="250" y1="200" x2="392" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#5B34E8"/>
    </linearGradient>
  </defs>

  <rect width="640" height="400" fill="url(#bg)"/>
  <rect width="640" height="400" fill="url(#glow)"/>

  <!-- Title in the Apple system font (San Francisco / Helvetica Neue). -->
  <text x="320" y="68" fill="#2B1C66"
        font-family="-apple-system, SF Pro Display, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="30" font-weight="700" text-anchor="middle" letter-spacing="0.2">Install Notchify</text>
  <text x="320" y="98" fill="#6E63A0"
        font-family="-apple-system, SF Pro Text, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="15" font-weight="500" text-anchor="middle">Drag Notchify onto the Applications folder</text>

  <!-- Arrow from app (left) to Applications (right). Finder icons center at
       y=205; this arrow sits at their vertical center. -->
  <g stroke="url(#arrow)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="252" y1="205" x2="388" y2="205"/>
    <path d="M388 205 L364 185 M388 205 L364 225"/>
  </g>
</svg>
